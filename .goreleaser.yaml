project_name: proxfy

before:
  hooks:
    - go mod tidy

builds:
  - id: proxfy
    main: .
    binary: proxfy
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - id: proxfy
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - name: proxfy
    repository:
      owner: ferdikt
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/ferdikt/proxfy"
    description: "CLI HTTPS proxy for mobile debugging. A lightweight alternative to Charles Proxy and Proxyman."
    license: "MIT"
    install: |
      bin.install "proxfy"
    test: |
      assert_match "proxfy", shell_output("#{bin}/proxfy version")
